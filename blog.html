<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blog — McClain Thiel</title>
<meta name="description" content="Blog posts by McClain Thiel on AI, DNA language models, and machine learning." />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #fafaf8; --fg: #1a1a1a; --muted: #5a5a5a;
    --accent: #2d5016; --link: #2d5016;
    --card: #f0f0ec; --card-border: #e0dfd8; --rule: #d4d3cc;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0e; --fg: #e8e8e4; --muted: #9a9a94;
      --accent: #7ab85e; --link: #7ab85e;
      --card: #1a1a18; --card-border: #2a2a26; --rule: #2a2a26;
    }
  }
  [data-theme="light"] {
    --bg: #fafaf8; --fg: #1a1a1a; --muted: #5a5a5a;
    --accent: #2d5016; --link: #2d5016;
    --card: #f0f0ec; --card-border: #e0dfd8; --rule: #d4d3cc;
  }
  [data-theme="dark"] {
    --bg: #0f0f0e; --fg: #e8e8e4; --muted: #9a9a94;
    --accent: #7ab85e; --link: #7ab85e;
    --card: #1a1a18; --card-border: #2a2a26; --rule: #2a2a26;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 16px; line-height: 1.65; letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { font-family: 'Source Serif 4', 'Georgia', serif; font-weight: 700; letter-spacing: -0.02em; }

  .wrap { max-width: 720px; padding: 64px 24px 120px; margin: 0 auto; }

  a { color: var(--link); text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; transition: text-decoration-thickness 0.15s; }
  a:hover { text-decoration-thickness: 2px; }

  .nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; }
  .nav-links { display: flex; gap: 24px; align-items: center; font-size: 14px; }
  .nav-links a { color: var(--muted); text-decoration: none; }
  .nav-links a:hover { color: var(--fg); }
  .nav-name { font-family: 'Source Serif 4', serif; font-weight: 700; font-size: 18px; color: var(--fg); text-decoration: none; }
  .nav-name:hover { text-decoration: none; }

  .page-title { font-size: 28px; margin: 0 0 32px; }

  .post-list { list-style: none; padding: 0; margin: 0; }
  .post-item { padding: 16px 0; border-bottom: 1px solid var(--rule); }
  .post-item:last-child { border-bottom: none; }
  .post-item a { text-decoration: none; display: block; }
  .post-item a:hover .post-title { text-decoration: underline; }
  .post-title { font-weight: 600; font-size: 16px; margin: 0 0 4px; color: var(--fg); }
  .post-meta { font-size: 13px; color: var(--muted); margin: 0; }

  .footer { border-top: 1px solid var(--rule); padding-top: 24px; margin-top: 3rem; display: flex; gap: 24px; font-size: 14px; color: var(--muted); }
  .footer a { color: var(--muted); }
  .footer a:hover { color: var(--fg); }

  .theme-btn { border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 6px; border-radius: 8px; }
  .theme-btn:hover { color: var(--fg); }
  .theme-btn:focus-visible { outline: 2px solid var(--rule); outline-offset: 2px; }

  @media (max-width: 600px) {
    .wrap { padding: 40px 18px 100px; }
    .nav-links { gap: 16px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <nav class="nav">
      <a href="/" class="nav-name">McClain Thiel</a>
      <div class="nav-links">
        <a href="index.html#research">Research</a>
        <a href="index.html#writing">Writing</a>
        <a href="blog.html">Blog</a>
        <button id="themeBtn" class="theme-btn" aria-label="Toggle theme" title="Toggle theme">&#9788;</button>
      </div>
    </nav>

    <h1 class="page-title">Blog</h1>

    <ul id="postList" class="post-list">
      <li style="color:var(--muted)">Loading posts...</li>
    </ul>

    <div class="footer">
      <a href="/">Home</a>
      <a href="https://www.linkedin.com/in/mcclain-thiel/" target="_blank" rel="noreferrer">LinkedIn</a>
      <a href="https://github.com/McClain-Thiel" target="_blank" rel="noreferrer">GitHub</a>
    </div>
  </div>

<script>
  const root = document.documentElement;
  const btn = document.getElementById('themeBtn');
  const KEY = 'pref-theme';
  const saved = localStorage.getItem(KEY);
  if (saved === 'light' || saved === 'dark') root.setAttribute('data-theme', saved);
  const updateIcon = () => { btn.textContent = (root.getAttribute('data-theme') === 'dark') ? '\u25D0' : '\u263C'; };
  updateIcon();
  btn.addEventListener('click', () => {
    const cur = root.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem(KEY, next);
    updateIcon();
  });

  async function loadPosts() {
    try {
      const response = await fetch('blog/posts.json');
      const posts = await response.json();
      const postList = document.getElementById('postList');
      if (posts.length === 0) {
        postList.innerHTML = '<li style="color:var(--muted)">No posts yet.</li>';
        return;
      }
      postList.innerHTML = posts.map(post => `
        <li class="post-item">
          <a href="post.html?id=${post.id}">
            <p class="post-title">${post.title}</p>
            <p class="post-meta">${post.date}</p>
          </a>
        </li>
      `).join('');
    } catch (err) {
      document.getElementById('postList').innerHTML =
        '<li style="color:var(--muted)">No posts yet.</li>';
    }
  }
  loadPosts();
</script>
</body>
</html>
