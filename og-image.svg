<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#fafaf8"/>
  <rect x="0" y="0" width="1200" height="6" fill="#2d5016"/>

  <!-- Name -->
  <text x="80" y="220" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#1a1a1a">McClain Thiel</text>

  <!-- Tagline -->
  <text x="80" y="290" font-family="Georgia, serif" font-size="32" fill="#2d5016">I build generative models for DNA design.</text>

  <!-- Credentials -->
  <text x="80" y="350" font-family="Arial, sans-serif" font-size="20" fill="#5a5a5a">PhD researcher at UCL's Barnes Lab</text>
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="20" fill="#5a5a5a">Encode: AI for Science Fellow (Pillar VC × ARIA)</text>

  <!-- DNA double helix decoration -->
  <g transform="translate(950, 150)" opacity="0.15">
    <path d="M0,0 Q30,40 0,80 Q-30,120 0,160 Q30,200 0,240 Q-30,280 0,320" stroke="#2d5016" stroke-width="3" fill="none"/>
    <path d="M40,0 Q10,40 40,80 Q70,120 40,160 Q10,200 40,240 Q70,280 40,320" stroke="#2d5016" stroke-width="3" fill="none"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#2d5016" stroke-width="2"/>
    <line x1="0" y1="80" x2="40" y2="80" stroke="#2d5016" stroke-width="2"/>
    <line x1="0" y1="120" x2="40" y2="120" stroke="#2d5016" stroke-width="2"/>
    <line x1="0" y1="160" x2="40" y2="160" stroke="#2d5016" stroke-width="2"/>
    <line x1="0" y1="200" x2="40" y2="200" stroke="#2d5016" stroke-width="2"/>
    <line x1="0" y1="240" x2="40" y2="240" stroke="#2d5016" stroke-width="2"/>
    <line x1="0" y1="280" x2="40" y2="280" stroke="#2d5016" stroke-width="2"/>
  </g>

  <!-- URL -->
  <text x="80" y="550" font-family="Arial, sans-serif" font-size="18" fill="#9a9a94">mcclainthiel.com</text>
</svg>
